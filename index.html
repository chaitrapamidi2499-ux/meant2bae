<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meant2Bae</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;600;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --brand-wine: #4a0e0e; 
            --brand-pink: #b80849;
            --soft-pink: #ffd4dc;
            --cream-white: #fff4eb;
            --glass-bg: rgba(255, 244, 235, 0.04);
            --glass-border: rgba(255, 244, 235, 0.12);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }

        body {
            background-color: #000;
            background-image: radial-gradient(circle at center, var(--brand-wine) 0%, #000000 90%);
            background-attachment: fixed;
            color: var(--cream-white);
            font-family: 'Lato', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            width: 100%;
            max-width: 380px; /* Narrower for a tighter feel */
            height: auto; /* Changed to auto to pull everything together */
            max-height: 100dvh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* Fixed spacing between main blocks */
        }

        /* Header Section - Tightened */
        .header-section {
            text-align: center;
        }

        .logo {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 1.5px solid var(--brand-pink);
            object-fit: cover;
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'Urbanist', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--soft-pink);
            margin-top: 4px;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Navigation Section - Tightened gaps */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Reduced from 14px */
        }

        .card {
            display: block;
            text-decoration: none;
            background: var(--glass-bg);
            border: 0.5px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 18px; /* Slightly more compact */
            border-radius: 18px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .card:hover {
            background: rgba(184, 8, 73, 0.1);
            border-color: var(--brand-pink);
        }

        .card-title {
            display: block;
            font-family: 'Urbanist', sans-serif;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--cream-white);
        }

        .card-subtitle {
            display: block;
            font-size: 0.85rem;
            color: var(--soft-pink);
            opacity: 0.8;
            font-style: italic;
            margin-top: 2px;
        }

        /* Social Section - Tightened */
        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 5px;
        }

        .social-link {
            text-decoration: none;
            color: var(--cream-white);
            font-size: 1.2rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            background: var(--glass-bg);
            transition: all 0.3s ease;
        }

        .social-link:hover {
            border-color: var(--brand-pink);
            color: var(--brand-pink);
        }

    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-section">
            <img src="Meant2BaeLogo.jpeg" alt="Meant2Bae" class="logo">
            <h1>Meant2Bae</h1>
            <p class="tagline">Love, Handpicked for you</p>
        </div>

        <div class="links-container">
            <a href="https://signup.meant2bae.com/" class="card">
                <span class="card-title">Sign Up</span>
                <span class="card-subtitle">Curated dates start here</span>
            </a>

            <a href="https://nominate.meant2bae.com/" class="card">
                <span class="card-title">Nominate a Friend</span>
                <span class="card-subtitle">You know they need help</span>
            </a>

            <a href="https://www.meant2bae.com/" class="card">
                <span class="card-title">Meant2Bae</span>
                <span class="card-subtitle">Know our vibe</span>
            </a>
        </div>

        <div class="socials">
            <a href="https://www.instagram.com/meant_2_bae" target="_blank" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://x.com/Meant_2_bae" target="_blank" class="social-link"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.linkedin.com/company/meant2bae/" target="_blank" class="social-link"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
    </div>

</body>
</html>
