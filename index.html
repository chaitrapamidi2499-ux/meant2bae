<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meant2Bae</title>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&family=Lato:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: 'Lato', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ddfee1 0%, #cef2ff 25%, #ebd5ff 50%, #ffdfeb 75%, #ddfee1 100%);
      background-size: 300% 300%;
      animation: gradientShift 8s ease infinite;
      padding: 40px 20px;
      overflow: hidden
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 12px;
    }

    .logo-img {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      20% { transform: scale(1.08); }
      40% { transform: scale(1); }
      60% { transform: scale(1.05); }
    }

    .brand-name {
      font-family: 'Urbanist', sans-serif;
      font-weight: 800;
      font-size: 28px;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .brand-name span {
      color: #d61b56;
    }

    .tagline {
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      color: #4b5563;
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    .tagline .handwritten {
      font-family: 'Caveat', cursive;
      font-size: 18px;
      font-weight: 600;
      color: #d61b56;
    }

    .link-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      background: rgba(255, 255, 255, 0.9);
      border: 1.5px solid rgba(214, 27, 86, 0.3);
      border-radius: 16px;
      text-decoration: none;
      color: #1a1a1a;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
      animation: fadeUp 0.6s ease both;
    }

    .link-btn:nth-child(2) { animation-delay: 0.1s; }
    .link-btn:nth-child(3) { animation-delay: 0.2s; }
    .link-btn:nth-child(4) { animation-delay: 0.3s; }

    .link-btn:hover {
      background: rgba(214, 27, 86, 0.06);
      border-color: rgba(214, 27, 86, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(214, 27, 86, 0.15);
    }

    .link-btn:active { transform: translateY(0px); }

    .btn-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: 22px;
      height: 22px;
      stroke: #d61b56;
      stroke-width: 1.75;
      fill: none;
    }

    .link-btn:hover .btn-icon svg { stroke: #b81548; }

    .btn-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .btn-label {
      font-family: 'Urbanist', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #1a1a1a;
    }

    .btn-sub {
      font-size: 12px;
      color: #6b7280;
      font-style: italic;
    }

    .btn-arrow {
      margin-left: auto;
      color: rgba(214, 27, 86, 0.5);
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    .link-btn:hover .btn-arrow {
      transform: translateX(3px);
      color: #d61b56;
    }

    .footer {
      margin-top: 8px;
      font-size: 12px;
      color: #9ca3af;
      animation: fadeUp 0.6s ease 0.4s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
